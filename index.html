<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nathan | Unlock</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Courier+Prime:wght@400;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f5f1e8;
  color: #2b241b;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Courier Prime', monospace;
}

/* GAME SCREEN */
#game {
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 24px;
  letter-spacing: 3px;
  margin-bottom: 10px;
}

#counter {
  font-size: 18px;
  margin-top: 10px;
  opacity: 0.8;
}

.box {
  width: 80px;
  height: 80px;
  margin: 30px auto;
  background: #2b241b;
  cursor: pointer;
  transition: 0.2s;
  border-radius: 10px;
}

.box:active {
  transform: scale(0.9);
}

/* BACKGROUND (hidden first) */
#background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, #2b241b, #f5f1e8);
  transform: translateY(100%);
  transition: 1.5s ease;
  z-index: -1;
}

/* WELCOME SCREEN */
#welcome {
  position: absolute;
  text-align: center;
  opacity: 0;
  transition: 2s ease;
}

#welcome h2 {
  font-size: 40px;
  letter-spacing: 5px;
  animation: fontSwitch 3s infinite;
}

/* changing fonts animation */
@keyframes fontSwitch {
  0% { font-family: 'Courier Prime'; }
  25% { font-family: 'Playfair Display'; }
  50% { font-family: 'Courier Prime'; }
  75% { font-family: 'Playfair Display'; }
  100% { font-family: 'Courier Prime'; }
}

/* INFO PANEL */
#info {
  position: absolute;
  bottom: 40px;
  text-align: center;
  opacity: 0;
  transition: 2s ease;
  max-width: 80%;
}

#info p {
  margin-top: 10px;
  font-size: 14px;
  line-height: 1.5;
}

/* ACTIVE STATES */
.show-bg {
  transform: translateY(0%);
}

.show {
  opacity: 1 !important;
}

.hide {
  display: none;
}
</style>
</head>

<body>

<div id="background"></div>

<!-- GAME -->
<div id="game">
  <h1>UNLOCK THE IDENTITY</h1>
  <p>Click the block 7 times to reveal Nathan</p>

  <div class="box" onclick="clickBox()"></div>

  <div id="counter">Progress: 0 / 7</div>
</div>

<!-- WELCOME -->
<div id="welcome">
  <h2>WELCOME</h2>
</div>

<!-- INFO -->
<div id="info">
  <h3>NATHAN</h3>
  <p>
    Web Developer • Digital Builder • Anime Mindset<br><br>
    I create websites, AI ideas, and future systems.
    If you're here, you're early.
  </p>
</div>

<script>
let clicks = 0;

function clickBox() {
  clicks++;
  document.getElementById("counter").innerText = `Progress: ${clicks} / 7`;

  if (clicks >= 7) {
    unlock();
  }
}

function unlock() {
  document.getElementById("game").classList.add("hide");

  // slide background in
  document.getElementById("background").classList.add("show-bg");

  // show welcome
  setTimeout(() => {
    document.getElementById("welcome").classList.add("show");
  }, 800);

  // show info
  setTimeout(() => {
    document.getElementById("info").classList.add("show");
  }, 1800);
}
</script>

</body>
</html>
