<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nathan | Digital Universe</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: black;
  overflow: hidden;
  color: white;
}

/* Background glow grid */
.grid {
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveGrid 10s linear infinite;
  z-index: 0;
}

@keyframes moveGrid {
  from { transform: translateY(0px); }
  to { transform: translateY(40px); }
}

/* Particle canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
}

/* Main card */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  text-align: center;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,255,255,0.3);
  width: 90%;
  max-width: 420px;
}

/* PP (profile picture) */
.pp {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid cyan;
  margin: 10px auto;
  overflow: hidden;
  box-shadow: 0 0 25px cyan;
}

.pp img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Name glow */
h1 {
  font-size: 26px;
  margin-top: 10px;
  text-shadow: 0 0 10px cyan, 0 0 20px blue;
}

p {
  font-size: 14px;
  margin-top: 10px;
  opacity: 0.8;
}

.badges {
  margin-top: 15px;
}

.badge {
  display: inline-block;
  padding: 5px 10px;
  margin: 5px;
  border: 1px solid cyan;
  border-radius: 12px;
  font-size: 12px;
  box-shadow: 0 0 10px cyan;
}

/* Button glow */
button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 12px;
  background: cyan;
  color: black;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 20px cyan;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px cyan;
}
</style>
</head>

<body>

<div class="grid"></div>
<canvas id="particles"></canvas>

<div class="card">
  <div class="pp">
    <!-- PUT YOUR IMAGE HERE -->
    <img src="https://i.imgur.com/8Km9tLL.png" alt="profile">
  </div>

  <h1>Nathan</h1>
  <p>Web Developer • Anime Mindset • Digital Builder</p>

  <div class="badges">
    <div class="badge">HTML Master</div>
    <div class="badge">GitHub Creator</div>
    <div class="badge">AI Builder</div>
    <div class="badge">Future Legend</div>
  </div>

  <button onclick="alert('Welcome to my universe 🚀')">Enter My World</button>
</div>

<script>
// PARTICLE SYSTEM (anime glow dots)
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 3 + 1,
    dx: (Math.random() - 0.5) * 1,
    dy: (Math.random() - 0.5) * 1
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let p of particles) {
    ctx.beginPath();
    ctx.fillStyle = "cyan";
    ctx.shadowBlur = 15;
    ctx.shadowColor = "cyan";
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  }

  requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
  </html>
